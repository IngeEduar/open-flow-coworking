db:
  url: ${DB_URL}
  username: ${DB_USER}
  password: ${DB_PASS}
  pool:
    max-size: 15
    min-idle: 5

jpa:
  show-sql: false

notifications:
  url: ${NOTIFICATIONS_HOST}
  extraHeaders:
    - name: "Authorization"
      value: "xxxxxx"

security:
