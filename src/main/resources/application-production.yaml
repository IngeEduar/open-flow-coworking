    secret: ${JWT_SECRET_KEY:E089Gtog9YaAsnp7pcsO6RV9phk2UgEVSfmWb5qHx+A=}
    expiration:
      value: ${JWT_EXPIRATION_VALUE:6}
      unit: ${JWT_EXPIRATION_UNIT:HOURS}
